<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Financial Routine v1.1.1 — DJ DEVELOPMENT</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c9a84c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DJ Finance"/>
<link rel="apple-touch-icon" href="icons/icon.svg"/>
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--border:#2e2e2e;--border2:#3a3a3a;--text:#f0ede8;--text2:#a09d98;--text3:#6b6866;--gold:#c9a84c;--gold2:#e8c96a;--gold-dim:rgba(201,168,76,0.12);--red:#e05252;--red-dim:rgba(224,82,82,0.12);--green:#4caf82;--green-dim:rgba(76,175,130,0.12);--blue:#5b9bd5;--blue-dim:rgba(91,155,213,0.12);--purple:#9b7fe8;--radius:10px;--radius-sm:6px}
body.theme-light{--bg:#f5f4f1;--bg2:#ffffff;--bg3:#eeecea;--bg4:#e5e3df;--border:#dddbd7;--border2:#ccc9c4;--text:#1a1916;--text2:#5a5754;--text3:#9a9794;--gold:#a07830;--gold2:#c9a84c;--gold-dim:rgba(160,120,48,0.10);--red:#c0392b;--red-dim:rgba(192,57,43,0.10);--green:#27805a;--green-dim:rgba(39,128,90,0.10);--blue:#2860a8;--blue-dim:rgba(40,96,168,0.10);--purple:#6c4ec2}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}

/* SYNC BADGE */
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-name{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:-0.5px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.profile-switcher{padding:12px 12px 8px;border-bottom:1px solid var(--border)}
.profile-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:500;transition:all .15s}
.profile-btn:hover{border-color:var(--gold)}
.profile-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.profile-dropdown{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:4px;overflow:hidden}
.profile-option{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:12px;color:var(--text2);transition:background .1s}
.profile-option:hover{background:var(--bg4);color:var(--text)}
.profile-option.active{color:var(--gold)}
.nav{flex:1;padding:10px 0}
.nav-section{padding:6px 14px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;color:var(--text2);cursor:pointer;transition:all .15s;font-size:13px;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.sidebar-footer{padding:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* MAIN */
.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-date{font-size:12px;color:var(--text3)}
.btn-primary{background:var(--gold);color:#0d0d0d;border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;transition:all .15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.content{padding:24px;flex:1}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-card.green::before{background:var(--green)}
.kpi-card.red::before{background:var(--red)}
.kpi-card.gold::before{background:var(--gold)}
.kpi-card.blue::before{background:var(--blue)}
.kpi-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:20px;font-weight:700;line-height:1.2}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.gold{color:var(--gold)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 12px;font-size:13px;color:var(--text2);vertical-align:middle}
td.text-main{color:var(--text);font-weight:500}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.pago,.badge.recebido{background:var(--green-dim);color:var(--green)}
.badge.pendente{background:var(--gold-dim);color:var(--gold)}
.badge.vencido,.badge.urgente{background:var(--red-dim);color:var(--red)}
.badge.previsto{background:var(--blue-dim);color:var(--blue)}
.badge-cat{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;color:var(--text3);font-size:22px;line-height:1;padding:0 4px}
.modal-close:hover{color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;transition:border-color .15s}
.form-input:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:13px}
.alert.danger{background:var(--red-dim);border:1px solid rgba(224,82,82,.25)}
.alert.warning{background:var(--gold-dim);border:1px solid rgba(201,168,76,.25)}
.alert-title{font-weight:600;margin-bottom:2px}
.alert-sub{font-size:12px;color:var(--text2)}

/* MISC */
.action-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.search-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;display:flex;align-items:center;gap:8px;width:220px}
.search-wrap input{background:none;border:none;color:var(--text);font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.chip.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
.chip:hover:not(.active){border-color:var(--border2);color:var(--text2)}
.progress-bar{height:5px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty-icon{font-size:28px;margin-bottom:8px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}.toast.info{border-color:var(--blue)}
.page-header{margin-bottom:20px}
.page-header h1{font-size:20px;font-weight:700}
.page-header p{font-size:13px;color:var(--text3);margin-top:3px}
.btn-icon{background:none;border:none;color:var(--text3);padding:4px 6px;border-radius:4px;cursor:pointer;transition:all .15s;font-size:13px}
.btn-icon:hover{color:var(--red);background:var(--red-dim)}
.btn-icon.edit:hover{color:var(--gold);background:var(--gold-dim)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
pre{font-size:11px;color:var(--text2);background:var(--bg3);padding:12px;border-radius:6px;overflow:auto;max-height:260px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.export-card{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border:1px solid var(--gold);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.export-card h3{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px}
.export-card p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px}

/* ── PIN SCREEN ─────────────────────────────────────────────────────────────── */
#pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.pin-box{display:flex;flex-direction:column;align-items:center;width:320px}
.pin-logo{font-size:26px;font-weight:900;color:var(--gold);letter-spacing:-1px;margin-bottom:2px}
.pin-dev{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:32px}
.pin-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;text-align:center}
.pin-subtitle{font-size:12px;color:var(--text3);margin-bottom:24px;text-align:center;min-height:18px}
.pin-dots{display:flex;gap:12px;margin-bottom:32px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;margin-bottom:20px}
.pin-key{height:56px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:20px;font-weight:600;font-family:inherit;transition:all .1s;display:flex;align-items:center;justify-content:center}
.pin-key:hover{background:var(--bg4);border-color:var(--border2)}
.pin-key:active{background:var(--gold-dim);border-color:var(--gold);transform:scale(.95)}
.pin-key.del{font-size:16px;color:var(--text2)}
.pin-key.confirm{background:var(--gold);color:#000;font-weight:800;border-color:var(--gold)}
.pin-key.confirm:hover{background:var(--gold2)}
.pin-key.confirm:disabled,.pin-key.confirm[data-disabled]{background:var(--bg3);color:var(--text3);border-color:var(--border);cursor:not-allowed;transform:none}
.pin-msg{font-size:12px;font-weight:600;min-height:18px;text-align:center}
.pin-msg.error{color:var(--red)}
.pin-msg.success{color:var(--green)}

/* ── SIDEBAR COLLAPSE (desktop) ─────────────────────────────────────────────── */
.sidebar-collapse-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:7px 10px;border-radius:var(--radius-sm);background:transparent;border:1px solid var(--border);color:var(--text3);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.sidebar-collapse-btn:hover{color:var(--text);border-color:var(--border2)}
.sidebar.collapsed{width:60px;min-width:60px}
.sidebar.collapsed .logo-sub,.sidebar.collapsed .profile-switcher,.sidebar.collapsed .nav-section,.sidebar.collapsed .nav-label,.sidebar.collapsed .btn-ghost,.sidebar.collapsed .sync-badge{display:none!important}
.sidebar.collapsed .sidebar-logo{padding:16px 8px;text-align:center}
.sidebar.collapsed .logo-name{font-size:11px;letter-spacing:0}
.sidebar.collapsed .nav-item{padding:11px;justify-content:center;gap:0;border-left-color:transparent}
.sidebar.collapsed .nav-item.active{border-left-color:transparent;background:var(--gold-dim)}
.sidebar.collapsed .nav-item .nav-icon{font-size:19px}
.sidebar.collapsed .sidebar-collapse-btn span{display:none}
.sidebar.collapsed .sidebar-footer{padding:10px 8px;gap:6px}
.main.sb-collapsed{margin-left:60px}

/* ── OVERLAY & MOBILE DRAWER ─────────────────────────────────────────────────── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);transition:opacity .25s}
.sidebar-overlay.visible{display:block}
.mobile-topbar-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:4px 8px;cursor:pointer;border-radius:6px;line-height:1;flex-shrink:0}
.mobile-topbar-btn:hover{background:var(--bg3)}

/* ── MOBILE BOTTOM NAV ───────────────────────────────────────────────────────── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:100}
.mobile-nav-inner{display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;transition:color .15s;font-family:inherit;-webkit-tap-highlight-color:transparent}
.mobile-nav-btn.active{color:var(--gold)}
.mobile-nav-btn .mn-icon{font-size:21px;line-height:1.1}
.mobile-nav-btn:active{background:var(--bg3)}

/* ── MEDIA: MOBILE ───────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:100;position:fixed;height:100vh}
  .sidebar.mobile-open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .main{margin-left:0!important}
  .topbar{padding:0 10px;height:52px;gap:8px}
  .topbar-title{font-size:14px;font-weight:600}
  .topbar-date{display:none}
  #djf-clock{display:none}
  .content{padding:12px 12px 72px}
  .mobile-topbar-btn{display:flex}
  .mobile-nav{display:block}
  .kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:10px!important}
  .grid-2{grid-template-columns:1fr!important}
  .form-row{grid-template-columns:1fr!important}
  .action-row{flex-direction:column;align-items:stretch;gap:8px}
  .action-row .search-wrap{width:100%}
  .action-row .btn-primary,.action-row .btn-ghost{width:100%;justify-content:center}
  .modal-overlay{padding:0!important;align-items:flex-end!important}
  .modal{border-radius:20px 20px 0 0!important;max-height:93vh!important;max-width:100%!important;width:100%!important;padding:20px 16px 24px}
  .modal-title{font-size:15px}
  .page-header{margin-bottom:14px}
  .page-header h1{font-size:17px}
  .page-header p{font-size:12px}
  .card{padding:14px}
  .kpi-card{padding:13px}
  .kpi-value{font-size:17px}
  .sidebar-collapse-btn{display:none}
  table{font-size:12px}
  td,th{padding:7px 8px!important}
}
@media(min-width:769px){
  .mobile-nav{display:none!important}
  .mobile-topbar-btn{display:none!important}
  .sidebar-overlay{display:none!important}
}
</style>
</head>
<body>
<div id="pin-overlay"></div>
<div id="app" style="display:none"></div>

<script>
// ── CONFIG FIREBASE ───────────────────────────────────────────────────────────
var FB_URL = 'https://djfinance-b3fd2-default-rtdb.firebaseio.com';

// ── ESTADO ───────────────────────────────────────────────────────────────────
var PROFILES_DEFAULT=[{id:'pessoal',label:'Pessoal',color:'#9b7fe8',icon:'👤'},{id:'artt',label:'Artt Burger',color:'#c9a84c',icon:'🍔'}];
var PROFILES=lsGet('profiles',PROFILES_DEFAULT);
var CATS_DEFAULT = {
  artt_pagar:    ['Fornecedor','Aluguel','Funcionários','Energia','Internet','Marketing','Impostos','Manutenção','Outros'],
  artt_receber:  ['Vendas PDV','Delivery','iFood','Franchise Fee','Outros'],
  artt_receitas: ['Vendas PDV','Delivery','iFood','Rappi','99Food','Cartão de Crédito','Cartão de Débito','Pix','Dinheiro','Franquia','Eventos','Outros'],
  pes_pagar:     ['Moradia','Alimentação','Saúde','Educação','Transporte','Lazer','Cartão','Outros'],
  pes_receber:   ['Salário','Pró-labore','Investimento','Outros'],
  pes_receitas:  ['Salário','Pró-labore','Freelance','Investimento','Aluguel recebido','Comissão','Outros'],
};
function getCats(key){ return lsGet('cats_'+key, CATS_DEFAULT[key]); }
function saveCats(key, arr){ lsSet('cats_'+key, arr); }
function getCatKey(profile, tipo){
  if(profile==='artt'&&tipo==='pagar') return 'artt_pagar';
  if(profile==='artt'&&tipo==='receber') return 'artt_receber';
  if(profile==='artt'&&tipo==='receitas') return 'artt_receitas';
  if(profile==='pessoal'&&tipo==='pagar') return 'pes_pagar';
  if(profile==='pessoal'&&tipo==='receitas') return 'pes_receitas';
  if(profile==='pessoal'&&tipo==='receber') return 'pes_receber';
  return profile+'_'+tipo;
}
var MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var TAXAS_DEFAULT={dinheiro:0,pix:0,credito:2.5,debito:1.2,notinha:0,ifood_online:12,yooga:0};

var BANCOS_ARTT_DEFAULT=[
  {id:'banco_stone',     nome:'Stone',        saldo:0, cor:'#00a86b', profile:'artt'},
  {id:'banco_mp',        nome:'Mercado Pago', saldo:0, cor:'#00b1ea', profile:'artt'},
  {id:'banco_cofre',     nome:'Cofre',        saldo:0, cor:'#c9a84c', profile:'artt'},
  {id:'banco_caixa',     nome:'Caixa',        saldo:0, cor:'#f5a623', profile:'artt'},
  {id:'banco_sicredi',   nome:'Sicredi',      saldo:0, cor:'#2d8a4e', profile:'artt'},
];

function initBancos(){
  var saved=lsGet('bancos',null);
  if(saved&&saved.length>0)return saved;
  lsSet('bancos',BANCOS_ARTT_DEFAULT);
  return BANCOS_ARTT_DEFAULT;
}

var state={
  syncStatus: 'idle',
  profile: lsGet('pf','pessoal'),
  page: 'dashboard',
  contas: [],
  metas: [],

// ── RECORRÊNCIA ───────────────────────────────────────────────────────────────
function addPeriodo(d,tipo,n){
  var dt=new Date(d+'T12:00:00');n=n||1;
  if(tipo==='diario')dt.setDate(dt.getDate()+n);
  else if(tipo==='semanal')dt.setDate(dt.getDate()+7*n);
  else if(tipo==='anual')dt.setFullYear(dt.getFullYear()+n);
  else dt.setMonth(dt.getMonth()+n);
  return dt.toLocaleDateString('sv-SE',{timeZone:'America/Sao_Paulo'});
}
function runRecorrencia(){
  var limite=nowBR();limite.setMonth(limite.getMonth()+2);
  var limitStr=limite.toLocaleDateString('sv-SE',{timeZone:'America/Sao_Paulo'});
  var recorrentes=state.contas.filter(function(c){return c.recorrente&&!c.gerado_de;});
  var novas=[];
  recorrentes.forEach(function(r){
    var geradas=state.contas.filter(function(c){return c.gerado_de===r.id;});
    var datas=[r.vencimento].concat(geradas.map(function(c){return c.vencimento;})).filter(Boolean).sort();
    var ultima=datas[datas.length-1]||r.vencimento;
    var ocGeradas=geradas.length;
    var cursor=addPeriodo(ultima,r.recorrencia_tipo,r.recorrencia_intervalo);
    var iter=0;
    while(cursor<=limitStr&&iter++<60){
      if(r.recorrencia_fim==='data'&&r.recorrencia_fim_data&&cursor>r.recorrencia_fim_data)break;
      if(r.recorrencia_fim==='ocorrencias'&&ocGeradas>=(r.recorrencia_fim_ocorrencias||12))break;
      var jaExiste=geradas.find(function(c){return c.vencimento===cursor;})||novas.find(function(c){return c.gerado_de===r.id&&c.vencimento===cursor;});
      if(!jaExiste){
        novas.push({id:'rec_'+r.id+'_'+cursor,descricao:r.descricao,valor:r.valor,categoria:r.categoria,vencimento:cursor,status:r.tipo==='pagar'?'pendente':'previsto',tipo:r.tipo,profile:r.profile,recorrente:false,gerado_de:r.id,notas:r.notas||'',prioridade:r.prioridade||'normal'});
        ocGeradas++;
      }
      cursor=addPeriodo(cursor,r.recorrencia_tipo,r.recorrencia_intervalo);
    }
  });
  if(novas.length>0){
    var c=state.contas.concat(novas);lsSet('contas',c);setState({contas:c});scheduleSave();
    showToast(novas.length+' recorrência(s) gerada(s)','info',3500);
  }
}

// ── HELPERS DOM ──────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs){Object.keys(attrs).forEach(function(k){
    if(k==='class'){e.className=attrs[k];}
    else if(k==='style'&&typeof attrs[k]==='object'){Object.assign(e.style,attrs[k]);}
    else if(k.startsWith('on')&&typeof attrs[k]==='function'){e[k]=attrs[k];}
    else if(k==='checked'){e.checked=!!attrs[k];}
    else{try{e.setAttribute(k,attrs[k]);}catch(ex){}}
  });}
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null||c===false||c===undefined)return;
      if(typeof c==='string'||typeof c==='number'||typeof c==='boolean')e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
  }
  return e;
}
function div(cls,children,extraStyle){
  var e=document.createElement('div');
  if(cls)e.className=cls;
  if(extraStyle)Object.assign(e.style,extraStyle);
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null||c===false||c===undefined)return;
      if(typeof c==='string'||typeof c==='number'||typeof c==='boolean')e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    });
  }
  return e;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

    return c.status==='recebido'&&c.vencimento&&c.vencimento.slice(0,7)===hoje.slice(0,7);

  var filtradas=catFiltro?doMes.filter(function(r){return r.categoria===catFiltro;}):doMes;
  filtradas=filtradas.slice().sort(function(a,b){return b.data.localeCompare(a.data);});

  var totalMes=doMes.reduce(function(a,r){return a+r.valor;},0);
  var totalAno=todas.filter(function(r){return r.data&&r.data.startsWith(now.getFullYear()+'');}).reduce(function(a,r){return a+r.valor;},0);
  var mesesComDados=[...new Set(todas.map(function(r){return r.data?r.data.slice(0,7):'';}))].filter(Boolean);
  var mediaMensal=mesesComDados.length>0?totalAno/mesesComDados.length:0;

  // por categoria no mês
  var porCat={};
  doMes.forEach(function(r){porCat[r.categoria]=(porCat[r.categoria]||0)+r.valor;});
  var catArr=Object.keys(porCat).map(function(c){return{cat:c,val:porCat[c]};}).sort(function(a,b){return b.val-a.val;});

  // selector de meses
  var todosOsMeses=[...new Set(todas.map(function(r){return r.data?r.data.slice(0,7):'';}))].filter(Boolean).sort().reverse();
  if(todosOsMeses.indexOf(mesFiltro)<0)todosOsMeses.unshift(mesFiltro);

  function fmtMes(m){var p=m.split('-');return MESES[parseInt(p[1])-1]+' '+p[0];}

  var selMes=el('select',{class:'form-input',style:{fontSize:'13px',padding:'6px 10px',minWidth:'130px'},onchange:function(e){setState({receitasMes:e.target.value,receitasCat:''});}});
  todosOsMeses.forEach(function(m){var op=el('option',{value:m},fmtMes(m));if(m===mesFiltro)op.selected=true;selMes.appendChild(op);});

  var selCat=el('select',{class:'form-input',style:{fontSize:'13px',padding:'6px 10px',minWidth:'140px'},onchange:function(e){setState({receitasCat:e.target.value});}});
  [el('option',{value:''},'Todas categorias')].concat(cats.map(function(c){var op=el('option',{value:c},c);if(c===catFiltro)op.selected=true;return op;})).forEach(function(o){selCat.appendChild(o);});

  var kpis=el('div',{class:'kpi-grid',style:{marginBottom:'14px'}},[
    el('div',{class:'kpi-card green'},[el('div',{class:'kpi-label'},'Receitas do mês'),el('div',{class:'kpi-value green'},fmtMoney(totalMes)),el('div',{class:'kpi-sub'},doMes.length+' lançamento(s)')]),
    el('div',{class:'kpi-card'},[el('div',{class:'kpi-label'},'Total no ano'),el('div',{class:'kpi-value'},fmtMoney(totalAno)),el('div',{class:'kpi-sub'},'Ano '+now.getFullYear())]),
    el('div',{class:'kpi-card'},[el('div',{class:'kpi-label'},'Média mensal'),el('div',{class:'kpi-value'},fmtMoney(mediaMensal)),el('div',{class:'kpi-sub'},'('+mesesComDados.length+' mes(es))')]),
  ]);

  var barMax=catArr.length>0?catArr[0].val:1;
  var catBars=catArr.map(function(c){
    var pct=Math.round((c.val/barMax)*100);
    var barItem=div('',[
      el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},[
        el('span',{style:{fontSize:'12px',color:'var(--text2)'}},c.cat),
        el('span',{style:{fontSize:'12px',fontWeight:'700',color:'var(--green)'}},fmtMoney(c.val)),
      ]),
      el('div',{style:{height:'6px',borderRadius:'3px',background:'var(--bg3)',overflow:'hidden'}},[
        el('div',{style:{width:pct+'%',height:'100%',background:'var(--green)',borderRadius:'3px',transition:'width .4s'}}),
      ]),
    ]);
    barItem.style.marginBottom='10px';
    return barItem;
  });

  var catCard=div('card',[
    div('card-title','Por categoria — '+fmtMes(mesFiltro)),
    catArr.length===0
      ?el('p',{style:{fontSize:'12px',color:'var(--text3)',padding:'8px 0'}},'Sem receitas neste mês')
      :el('div',{},catBars),
  ]);

  // tabela de lançamentos
  var rows=filtradas.map(function(r){
    var row=el('tr',{},[
      el('td',{style:{fontSize:'13px',fontWeight:'500'}},r.descricao||'—'),
      el('td',{},[el('span',{class:'badge badge-cat'},r.categoria||'—')]),
      el('td',{style:{color:'var(--text3)',fontSize:'12px'}},fmtDate(r.data)),
      el('td',{style:{textAlign:'right',fontWeight:'700',color:'var(--green)',fontSize:'14px'}},fmtMoney(r.valor)),
      el('td',{style:{textAlign:'right'}},[
        el('button',{class:'btn-icon edit',title:'Editar',onclick:function(){setState({receitaModal:{editItem:r}});}}, '✏️'),
        el('button',{class:'btn-icon',title:'Excluir',onclick:function(){if(confirm('Remover receita?'))deleteReceita(r.id);}}, '🗑️'),
      ]),
    ]);
    return row;
  });

  var tabela=div('card',[
    el('table',{style:{width:'100%',borderCollapse:'collapse'}},[
      el('thead',{},[el('tr',{},[
        el('th',{style:{textAlign:'left',padding:'8px 6px',fontSize:'11px',color:'var(--text3)',fontWeight:'600',textTransform:'uppercase',borderBottom:'1px solid var(--border)'}},'Descrição'),
        el('th',{style:{textAlign:'left',padding:'8px 6px',fontSize:'11px',color:'var(--text3)',fontWeight:'600',textTransform:'uppercase',borderBottom:'1px solid var(--border)'}},'Categoria'),
        el('th',{style:{textAlign:'left',padding:'8px 6px',fontSize:'11px',color:'var(--text3)',fontWeight:'600',textTransform:'uppercase',borderBottom:'1px solid var(--border)'}},'Data'),
        el('th',{style:{textAlign:'right',padding:'8px 6px',fontSize:'11px',color:'var(--text3)',fontWeight:'600',textTransform:'uppercase',borderBottom:'1px solid var(--border)'}},'Valor'),
        el('th',{style:{borderBottom:'1px solid var(--border)'}}),
      ])]),
      el('tbody',{},rows.length>0?rows:[
        el('tr',{},[el('td',{colspan:'5',style:{textAlign:'center',padding:'24px',color:'var(--text3)',fontSize:'13px'}},'Nenhuma receita neste mês')])
      ]),
    ]),
  ]);

  return div('',[
    div('page-header',[
      el('h1',{},'Receitas'),
      el('p',{},state.profile==='artt'?'Artt Burger — entradas por categoria':'Receitas pessoais por categoria'),
    ]),
    div('action-row',[
      el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},[selMes,selCat]),
      el('div',{style:{display:'flex',gap:'8px'}},[
        el('button',{class:'btn-ghost',style:{fontSize:'12px'},onclick:function(){setState({catManager:{key:catKey,tipo:'receitas'}});}}, '✏️ Categorias'),
        el('button',{class:'btn-primary',onclick:function(){setState({receitaModal:{editItem:null}});}}, '+ Nova receita'),
      ]),
    ]),
    kpis,
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 320px',gap:'14px',alignItems:'start'}},[tabela,catCard]),
  ]);
}

  if(transfModal)app.appendChild(transfModal);

  if(state.toast){

    app.appendChild(t);
  }
  root.appendChild(app);
  if(window._djfClockTimer)clearInterval(window._djfClockTimer);
  window._djfClockTimer=setInterval(function(){

    ck.textContent=new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  },1000);
}

<script>
// ── TEMA ──────────────────────────────────────────────────────────────────────
(function(){if(lsGet('theme','dark')==='light')document.body.classList.add('theme-light');})();

// ── PIN ───────────────────────────────────────────────────────────────────────
var PIN_KEY='djf_pin';

function getPin(){return localStorage.getItem(PIN_KEY);}
function savePin(p){localStorage.setItem(PIN_KEY,p);}

// ── MIGRAÇÃO: soma crédito/débito PDV existentes ao banco Stone ───────────────
function migrarVendasStone(){
  if(lsGet('mig_stone_v1',false))return; // já executou
  var stoneBanco=(state.bancos||[]).find(function(b){return b.nome&&b.nome.toLowerCase().indexOf('stone')!==-1;});
  if(!stoneBanco)return; // Stone não cadastrado ainda — tenta na próxima sessão
  var soma=0;
  var receitasAtualizadas=(state.receitas||[]).map(function(r){
    var isCreditoDebito=r.id&&(r.id.indexOf('_credito')!==-1||r.id.indexOf('_debito')!==-1);
    if(r.venda_id&&(!r.banco||r.banco==='')&&isCreditoDebito){
      soma=Math.round((soma+(r.valor||0))*100)/100;
      return Object.assign({},r,{banco:stoneBanco.id});
    }
    return r;
  });
  lsSet('mig_stone_v1',true); // marca antes de salvar para não repetir em caso de erro
  if(soma===0)return;
  var novosBancos=(state.bancos||[]).map(function(b){
    return b.id===stoneBanco.id?Object.assign({},b,{saldo:Math.round(((b.saldo||0)+soma)*100)/100}):b;
  });
  lsSet('receitas',receitasAtualizadas);
  lsSet('bancos',novosBancos);
  setState({receitas:receitasAtualizadas,bancos:novosBancos});
  scheduleSave();
  showToast('Stone atualizado: +'+fmtMoney(soma)+' de crédito/débito das vendas PDV','info',5000);
}

function initApp(){
  document.getElementById('app').style.display='';
  document.getElementById('pin-overlay').style.display='none';
  render();
  // Fecha drawer ao rotacionar / redimensionar para desktop
  window.removeEventListener('resize',window._djfResizeHandler);
  window._djfResizeHandler=function(){
    if(window.innerWidth>768&&state.sidebarOpen){Object.assign(state,{sidebarOpen:false});render();}
  };
  window.addEventListener('resize',window._djfResizeHandler);
  loadFromFirebase()
    .then(function(){runRecorrencia();migrarVendasStone();if(typeof setupTarefasNotificacoes==='function')setupTarefasNotificacoes();})
    .catch(function(){runRecorrencia();migrarVendasStone();if(typeof setupTarefasNotificacoes==='function')setupTarefasNotificacoes();});
}

function lockApp(){
  document.getElementById('app').style.display='none';
  var ov=document.getElementById('pin-overlay');
  ov.style.display='flex';
  buildPinScreen('enter');
}

function buildPinScreen(mode){
  // mode: 'setup' | 'confirm' | 'enter'
  var ov=document.getElementById('pin-overlay');
  var digits=[];
  var confirmDigits=null; // armazena primeiro PIN no fluxo de setup

  function render(){
    ov.innerHTML='';
    var box=document.createElement('div');box.className='pin-box';

    var logo=document.createElement('div');logo.className='pin-logo';logo.textContent='Financial Routine';
    var dev=document.createElement('div');dev.className='pin-dev';dev.textContent='DJ DEVELOPMENT';

    var titleText='';
    var subText='';
    if(mode==='setup'){titleText='Crie seu PIN';subText='Escolha 8 dígitos para proteger o sistema';}
    else if(mode==='confirm'){titleText='Confirme seu PIN';subText='Digite novamente os 8 dígitos escolhidos';}
    else{titleText='Bem-vindo de volta';subText='Digite seu PIN de 8 dígitos';}

    var title=document.createElement('div');title.className='pin-title';title.textContent=titleText;
    var sub=document.createElement('div');sub.className='pin-subtitle';sub.textContent=subText;

    // Dots
    var dotsEl=document.createElement('div');dotsEl.className='pin-dots';
    var dots=[];
    for(var i=0;i<8;i++){
      var d=document.createElement('div');d.className='pin-dot';
      dots.push(d);dotsEl.appendChild(d);
    }

    function updateDots(err){
      dots.forEach(function(d,i){
        d.className='pin-dot'+(i<digits.length?' filled':'')+(err?' error':'');
      });
    }

    var msg=document.createElement('div');msg.className='pin-msg';

    // Keypad
    var pad=document.createElement('div');pad.className='pin-keypad';
    var keys=['1','2','3','4','5','6','7','8','9','⌫','0','✓'];

    function pressKey(k){
      if(k==='⌫'){
        if(digits.length>0)digits.pop();
        updateDots(false);msg.textContent='';
        // Se estava com erro, limpa
        dots.forEach(function(d){d.classList.remove('error');});
      } else if(k==='✓'){
        if(digits.length<8){msg.className='pin-msg error';msg.textContent='Digite todos os 8 dígitos';return;}
        var pin=digits.join('');
        if(mode==='setup'){
          // Guarda e vai para confirm
          confirmDigits=pin;
          digits=[];
          mode='confirm';
          buildPinScreen_confirm(confirmDigits);
        } else if(mode==='confirm'){
          if(pin===confirmDigits){
            savePin(pin);
            msg.className='pin-msg success';msg.textContent='PIN criado com sucesso!';
            setTimeout(initApp,600);
          } else {
            digits=[];
            updateDots(true);
            msg.className='pin-msg error';msg.textContent='PINs não coincidem. Tente novamente.';
            setTimeout(function(){mode='setup';confirmDigits=null;buildPinScreen('setup');},1200);
          }
        } else {
          var saved=getPin();
          if(pin===saved){
            msg.className='pin-msg success';msg.textContent='✓ Acesso liberado';
            setTimeout(function(){
              if(typeof bioSuportado==='function'&&bioSuportado()&&!bioRegistrado()){oferecerBiometria();}else{initApp();}
            },400);
          } else {
            digits=[];
            updateDots(true);
            msg.className='pin-msg error';msg.textContent='PIN incorreto. Tente novamente.';
            setTimeout(function(){updateDots(false);msg.textContent='';},1000);
          }
        }
      } else {
        if(digits.length>=8)return;
        digits.push(k);
        updateDots(false);
        if(digits.length===8&&k!=='✓'){
          // Auto-submit
          setTimeout(function(){pressKey('✓');},120);
        }
      }
    }

    keys.forEach(function(k){
      var b=document.createElement('button');
      b.className='pin-key'+(k==='⌫'?' del':k==='✓'?' confirm':'');
      b.textContent=k;
      b.onclick=function(){pressKey(k);};
      pad.appendChild(b);
    });

    // Teclado físico
    function onKey(e){
      if(e.key>='0'&&e.key<='9'){pressKey(e.key);}
      else if(e.key==='Backspace'){pressKey('⌫');}
      else if(e.key==='Enter'){pressKey('✓');}
    }
    document.removeEventListener('keydown',ov._keyHandler);
    ov._keyHandler=onKey;
    document.addEventListener('keydown',onKey);

    box.appendChild(logo);box.appendChild(dev);box.appendChild(title);box.appendChild(sub);
    box.appendChild(dotsEl);box.appendChild(pad);box.appendChild(msg);
    if(mode==='enter'&&typeof bioSuportado==='function'&&bioSuportado()&&bioRegistrado()){
      var bioSep=document.createElement('div');
      bioSep.style.cssText='font-size:11px;color:var(--text3);margin:6px 0 8px;letter-spacing:.5px;';
      bioSep.textContent='— ou —';
      var bioBtnEl=document.createElement('button');
      bioBtnEl.style.cssText='width:234px;height:48px;border-radius:12px;background:rgba(91,155,213,.1);border:1px solid var(--blue);color:var(--blue);font-size:15px;font-family:inherit;cursor:pointer;transition:all .15s;margin-bottom:4px;';
      bioBtnEl.textContent='🔐 Usar Face ID / Digital';
      bioBtnEl.onmouseenter=function(){bioBtnEl.style.background='rgba(91,155,213,.2)';};
      bioBtnEl.onmouseleave=function(){bioBtnEl.style.background='rgba(91,155,213,.1)';};
      bioBtnEl.onclick=function(){
        msg.className='pin-msg';msg.textContent='Aguardando verificação biométrica...';
        bioAutenticar(function(){
          msg.className='pin-msg success';msg.textContent='✓ Acesso liberado';
          setTimeout(initApp,300);
        },function(){
          msg.className='pin-msg error';msg.textContent='Biometria falhou. Use o PIN.';
          setTimeout(function(){msg.className='pin-msg';msg.textContent='';},2000);
        });
      };
      box.appendChild(bioSep);
      box.appendChild(bioBtnEl);
    }
    ov.appendChild(box);
  }

  // Wrapper para confirm reusar confirmDigits
  function buildPinScreen_confirm(firstPin){
    var digits2=[];
    ov.innerHTML='';
    var box=document.createElement('div');box.className='pin-box';
    var logo=document.createElement('div');logo.className='pin-logo';logo.textContent='Financial Routine';
    var dev=document.createElement('div');dev.className='pin-dev';dev.textContent='DJ DEVELOPMENT';
    var title=document.createElement('div');title.className='pin-title';title.textContent='Confirme seu PIN';
    var sub=document.createElement('div');sub.className='pin-subtitle';sub.textContent='Digite novamente os 8 dígitos';
    var dotsEl=document.createElement('div');dotsEl.className='pin-dots';
    var dots2=[];
    for(var i=0;i<8;i++){var d=document.createElement('div');d.className='pin-dot';dots2.push(d);dotsEl.appendChild(d);}
    function upd2(err){dots2.forEach(function(d,i){d.className='pin-dot'+(i<digits2.length?' filled':'')+(err?' error':'');});}
    var msg2=document.createElement('div');msg2.className='pin-msg';
    var pad2=document.createElement('div');pad2.className='pin-keypad';
    ['1','2','3','4','5','6','7','8','9','⌫','0','✓'].forEach(function(k){
      var b=document.createElement('button');
      b.className='pin-key'+(k==='⌫'?' del':k==='✓'?' confirm':'');
      b.textContent=k;
      b.onclick=function(){
        if(k==='⌫'){if(digits2.length>0)digits2.pop();upd2(false);msg2.textContent='';}
        else if(k==='✓'){
          if(digits2.length<8){msg2.className='pin-msg error';msg2.textContent='Digite todos os 8 dígitos';return;}
          if(digits2.join('')===firstPin){savePin(firstPin);msg2.className='pin-msg success';msg2.textContent='PIN criado!';setTimeout(initApp,500);}
          else{digits2=[];upd2(true);msg2.className='pin-msg error';msg2.textContent='PINs diferentes. Recomeçando...';setTimeout(function(){buildPinScreen('setup');},1200);}
        } else {
          if(digits2.length>=8)return;
          digits2.push(k);upd2(false);
          if(digits2.length===8)setTimeout(function(){
            if(digits2.join('')===firstPin){savePin(firstPin);msg2.className='pin-msg success';msg2.textContent='PIN criado!';setTimeout(initApp,500);}
            else{digits2=[];upd2(true);msg2.className='pin-msg error';msg2.textContent='PINs diferentes. Recomeçando...';setTimeout(function(){buildPinScreen('setup');},1200);}
          },120);
        }
      };
      pad2.appendChild(b);
    });
    function onKey2(e){
      if(e.key>='0'&&e.key<='9'){var b2=Array.from(pad2.children).find(function(x){return x.textContent===e.key;});if(b2)b2.click();}
      else if(e.key==='Backspace'){Array.from(pad2.children).find(function(x){return x.textContent==='⌫';}).click();}
      else if(e.key==='Enter'){Array.from(pad2.children).find(function(x){return x.textContent==='✓';}).click();}
    }
    document.removeEventListener('keydown',ov._keyHandler);
    ov._keyHandler=onKey2;
    document.addEventListener('keydown',onKey2);
    box.appendChild(logo);box.appendChild(dev);box.appendChild(title);box.appendChild(sub);
    box.appendChild(dotsEl);box.appendChild(pad2);box.appendChild(msg2);
    ov.appendChild(box);
  }

  render();
}

// ── BIOMETRIA (WebAuthn — Face ID / Touch ID / Windows Hello) ─────────────────
var BIO_CRED_KEY = 'djf_bio_cred';

function bioSuportado() {
  return !!(window.PublicKeyCredential && navigator.credentials &&
    (window.location.protocol === 'https:' || window.location.hostname === 'localhost'));
}
function bioRegistrado() {
  return !!localStorage.getItem(BIO_CRED_KEY);
}
function bioRegistrar(onOk, onErr) {
  var ch = new Uint8Array(32); crypto.getRandomValues(ch);
  var uid = new Uint8Array(16); crypto.getRandomValues(uid);
  navigator.credentials.create({ publicKey: {
    challenge: ch,
    rp: { name: 'Financial Routine', id: window.location.hostname || 'localhost' },
    user: { id: uid, name: 'djfinance', displayName: 'Financial Routine' },
    pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
    authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
    timeout: 60000,
  }}).then(function(cred) {
    localStorage.setItem(BIO_CRED_KEY, JSON.stringify(Array.from(new Uint8Array(cred.rawId))));
    if (onOk) onOk();
  }).catch(function(e) { if (onErr) onErr(e); });
}
function bioAutenticar(onOk, onErr) {
  var raw = localStorage.getItem(BIO_CRED_KEY);
  if (!raw) { if (onErr) onErr(new Error('Não registrado')); return; }
  var credId;
  try { credId = new Uint8Array(JSON.parse(raw)); } catch(e) { if(onErr) onErr(e); return; }
  var ch = new Uint8Array(32); crypto.getRandomValues(ch);
  navigator.credentials.get({ publicKey: {
    challenge: ch,
    rpId: window.location.hostname || 'localhost',
    allowCredentials: [{ id: credId, type: 'public-key' }],
    userVerification: 'required',
    timeout: 60000,
  }}).then(function(cred) {
    if (cred) { if (onOk) onOk(); } else { if (onErr) onErr(new Error('sem credencial')); }
  }).catch(function(e) { if (onErr) onErr(e); });
}

function oferecerBiometria() {
  var ov = document.getElementById('pin-overlay');
  ov.style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  ov.innerHTML = '';
  var box = document.createElement('div'); box.className = 'pin-box';
  var logo = document.createElement('div'); logo.className = 'pin-logo'; logo.textContent = 'Financial Routine';
  var dev2 = document.createElement('div'); dev2.className = 'pin-dev'; dev2.textContent = 'DJ DEVELOPMENT';
  var ico = document.createElement('div'); ico.style.cssText = 'font-size:52px;margin:12px 0 8px;'; ico.textContent = '🔐';
  var tit = document.createElement('div'); tit.className = 'pin-title'; tit.textContent = 'Ativar Face ID / Digital?';
  var sub2 = document.createElement('div'); sub2.className = 'pin-subtitle'; sub2.textContent = 'Entre sem PIN nos próximos acessos';
  var msgB = document.createElement('div'); msgB.className = 'pin-msg'; msgB.style.marginTop = '8px';

  var btnSim = document.createElement('button');
  btnSim.className = 'pin-key confirm';
  btnSim.style.cssText = 'width:220px;font-size:14px;height:50px;border-radius:12px;margin-bottom:10px;';
  btnSim.textContent = '✓ Ativar Face ID / Digital';
  btnSim.onclick = function() {
    msgB.textContent = 'Siga as instruções do dispositivo...'; msgB.className = 'pin-msg';
    bioRegistrar(function() {
      msgB.className = 'pin-msg success'; msgB.textContent = '✓ Biometria ativada!';
      setTimeout(function() { ov.style.display = 'none'; initApp(); }, 700);
    }, function() {
      msgB.className = 'pin-msg error'; msgB.textContent = 'Não foi possível ativar. Entrando com PIN.';
      setTimeout(function() { ov.style.display = 'none'; initApp(); }, 1500);
    });
  };

  var btnNao = document.createElement('button');
  btnNao.className = 'pin-key';
  btnNao.style.cssText = 'width:220px;font-size:13px;height:40px;color:var(--text3);';
  btnNao.textContent = 'Agora não';
  btnNao.onclick = function() { ov.style.display = 'none'; initApp(); };

  box.appendChild(logo); box.appendChild(dev2); box.appendChild(ico);
  box.appendChild(tit); box.appendChild(sub2);
  box.appendChild(btnSim); box.appendChild(btnNao); box.appendChild(msgB);
  ov.appendChild(box);
}
